<!DOCTYPE html><html lang="pt-BR"><head>
<script>
(function() {
  try {
    var urlParams = new URLSearchParams(window.location.search);

    // Salva UTMs se vieram na URL
    var hasUtms = urlParams.has('utm_source') || urlParams.has('utm_medium') || urlParams.has('utm_campaign');
    if (hasUtms) {
      var params = {};
      ['utm_source','utm_medium','utm_campaign','utm_content','utm_term','utm_id'].forEach(function(k) {
        var v = urlParams.get(k);
        if (v) params[k] = v;
      });
      localStorage.setItem('TrackingParams', JSON.stringify(params));
    }

    // Salva sck SOMENTE se veio explicitamente na URL (nao injeta automaticamente)
    var sck = urlParams.get('sck');
    if (sck) localStorage.setItem('IndexTrack', sck);

    // Recupera UTMs perdidos - mas NAO injeta sck se nao veio na URL
    if (!hasUtms) {
      var saved = localStorage.getItem('TrackingParams');
      if (!saved) return;
      var savedUtms = JSON.parse(saved);
      var rebuild = new URLSearchParams(window.location.search);
      for (var k in savedUtms) {
        if (savedUtms.hasOwnProperty(k) && !rebuild.has(k)) rebuild.set(k, savedUtms[k]);
      }
      if (window.history && window.history.replaceState) {
        window.history.replaceState(null, '', window.location.pathname + '?' + rebuild.toString());
      }
    }
  } catch(e) {}
})();
</script>

  <!-- Video timer + micro-interactions + smooth transition -->
  <script>
  (function(){
    var TIMER_DURATION = 30;
    var timerFill = document.getElementById('timerFill');
    var timerText = document.getElementById('timerText');
    var board = document.querySelector('.board');
    var startTime = Date.now();

    function updateTimer(){
      var elapsed = (Date.now() - startTime) / 1000;
      var remaining = Math.max(0, TIMER_DURATION - elapsed);
      var pct = Math.min(100, (elapsed / TIMER_DURATION) * 100);
      if(timerFill) timerFill.style.width = pct + '%';
      if(timerText) timerText.textContent = '0:' + String(Math.ceil(remaining)).padStart(2, '0');
      if(remaining > 0) requestAnimationFrame(updateTimer);
    }
    requestAnimationFrame(updateTimer);

    // Ripple effect on buttons
    document.querySelectorAll('.btn-positive, .btn-negative').forEach(function(btn){
      btn.addEventListener('click', function(e){
        var rect = btn.getBoundingClientRect();
        var ripple = document.createElement('span');
        ripple.className = 'ripple';
        var size = Math.max(rect.width, rect.height);
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
        ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
        btn.appendChild(ripple);
        setTimeout(function(){ ripple.remove(); }, 500);
      });
    });

    // Smooth page transition before navigating
    var origReplace = window.location.replace;
    window.smoothNavigate = function(url){
      if(board) board.classList.add('page-fade-out');
      setTimeout(function(){ origReplace.call(window.location, url); }, 280);
    };

    // Intercepta navegação por href (usado pelo modal)
    var _origHref = Object.getOwnPropertyDescriptor(Location.prototype, 'href');
    try {
      Object.defineProperty(window.location, 'href', {
        get: function(){ return _origHref.get.call(window.location); },
        set: function(val){
          if(val && val !== window.location.href && !val.startsWith('javascript')){
            window.smoothNavigate(val);
          } else {
            _origHref.set.call(window.location, val);
          }
        }
      });
    } catch(e) {}

    // Intercepta o NEXT_PAGE para usar transição suave
    var origNext = window.NEXT_PAGE;
    if(origNext){
      var checkNav = setInterval(function(){
        var els = document.querySelectorAll('[data-nav-attached]');
        els.forEach(function(el){
          if(!el.hasAttribute('data-smooth')){
            el.setAttribute('data-smooth', 'true');
            el.addEventListener('click', function(e){
              e.preventDefault();
              window.smoothNavigate(el.getAttribute('href') || origNext);
            });
          }
        });
      }, 500);
    }
  })();
  </script>

  <!-- BUTTON FORCER -->
  <script>
  (function() {
    function forceParamsOnButtons() {
      try {
        var currentParams = window.location.search;
        if (!currentParams) return;
        
        var selectors = ['a[href*="video"]', 'a[href*="withdraw"]', 'a[href*="final"]', 'button[onclick*="video"]', 'button[onclick*="withdraw"]', '[data-href*="video"]'];
        var elements = document.querySelectorAll(selectors.join(','));
        
        for (var i = 0; i < elements.length; i++) {
          var element = elements[i];
          if (element.hasAttribute('data-utm-forced')) continue;
          
          element.setAttribute('data-utm-forced', 'true');
          element.addEventListener('click', function(e) {
            try {
              e.preventDefault();
              e.stopImmediatePropagation();
              var href = this.getAttribute('href') || this.getAttribute('data-href') || this.getAttribute('data-url');
              if (!href) return;
              var baseHref = href.split('?')[0].split('#')[0];
              window.location.href = baseHref + currentParams;
            } catch (err) {}
          }, true);
        }
      } catch (e) {}
    }
    
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', forceParamsOnButtons);
    } else {
      forceParamsOnButtons();
    }
    
    if (window.MutationObserver) {
      var observer = new MutationObserver(function(mutations) {
        for (var i = 0; i < mutations.length; i++) {
          if (mutations[i].addedNodes.length > 0) forceParamsOnButtons();
        }
      });
      if (document.body) observer.observe(document.body, {childList: true, subtree: true});
    }
  })();
  </script>
