<script>
(function() {
  try {
    var urlParams = new URLSearchParams(window.location.search);

    // Salva UTMs se vieram na URL
    var hasUtms = urlParams.has('utm_source') || urlParams.has('utm_medium') || urlParams.has('utm_campaign');
    if (hasUtms) {
      var params = {};
      ['utm_source','utm_medium','utm_campaign','utm_content','utm_term','utm_id'].forEach(function(k) {
        var v = urlParams.get(k);
        if (v) params[k] = v;
      });
      localStorage.setItem('TrackingParams', JSON.stringify(params));
    }

    // Salva sck SOMENTE se veio explicitamente na URL (nao injeta automaticamente)
    var sck = urlParams.get('sck');
    if (sck) localStorage.setItem('IndexTrack', sck);

    // Recupera UTMs perdidos - mas NAO injeta sck se nao veio na URL
    if (!hasUtms) {
      var saved = localStorage.getItem('TrackingParams');
      if (!saved) return;
      var savedUtms = JSON.parse(saved);
      var rebuild = new URLSearchParams(window.location.search);
      for (var k in savedUtms) {
        if (savedUtms.hasOwnProperty(k) && !rebuild.has(k)) rebuild.set(k, savedUtms[k]);
      }
      if (window.history && window.history.replaceState) {
        window.history.replaceState(null, '', window.location.pathname + '?' + rebuild.toString());
      }
    }
  } catch(e) {}
})();
</script>

  <script>
    (function () {
      function renderWallet() {
        var el = document.getElementById('walletAmount');
        if (!el) return;
        try {
          var raw = sessionStorage.getItem('vsl_wallet_amount') || '213.99';
          var v = Math.round(parseFloat(raw) || 0);
          el.textContent = 'US$ ' + v;
        } catch (e) {
          el.textContent = 'US$ 213.99';
        }
      }

      function initCommentsRotation() {
        var wrap = document.querySelector('.comments-wrap');
        if (!wrap) { return; }

        var labelEl = document.getElementById('commentsCount');
  var INTERVAL = 10000; // increased by 5s as requested
        var timer = null;
        var current = 0;

        function collect() {
          var progresses = Array.from(wrap.querySelectorAll('.comment-progress'));
          var rows = Array.from(wrap.querySelectorAll('.comment-row'));
          return { progresses: progresses, rows: rows };
        }

        function updateLabel(idxOneBased, total) {
          if (labelEl) labelEl.textContent = idxOneBased + ' of ' + total + ' comments';
        }

        function showIndex(i) {
          var data = collect();
          var progresses = data.progresses;
          var rows = data.rows;
          var total = rows.length;
          if (total === 0) { updateLabel(0,0); return; }
          i = ((i % total) + total) % total;
          current = i;

          progresses.forEach(function(p){ p.style.display = 'none'; });
          rows.forEach(function(r){ r.style.display = 'none'; });

          var p = progresses[i];
          var r = rows[i];
          if (p) {
            p.style.display = 'block';
            var fill = p.querySelector('.fill');
            if (fill) {
              fill.style.animation = 'none';
              void fill.offsetWidth;
              fill.style.animation = 'progressFill 10s linear forwards';
            }
          }
          if (r) r.style.display = 'flex';

          updateLabel(i + 1, total);
        }

        function next() {
          var data = collect();
          if (data.rows.length === 0) return;
          current = (current + 1) % data.rows.length;
          showIndex(current);
        }

        function start() {
          stop();
          showIndex(current);
          timer = setInterval(next, INTERVAL);
        }
        function stop() { if (timer) { clearInterval(timer); timer=null; } }

        (function initialHide(){
          var data = collect();
          data.progresses.forEach(function(p){ p.style.display='none'; });
          data.rows.forEach(function(r){ r.style.display='none'; });
        })();

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', function(){ setTimeout(start,180); }, { once:true });
        } else {
          setTimeout(start,180);
        }
      }

      renderWallet();
      initCommentsRotation();

      // Show buy button after 8min20s (500s)
      setTimeout(function() {
        var btnWrap = document.getElementById('buyButtonWrap');
        if (btnWrap) btnWrap.style.display = 'block';
      }, 500000);

      // Initialize Lucide icons
      lucide.createIcons();
    })();
  </script>

              var baseHref = href.split('?')[0].split('#')[0];
              
              // Fire InitiateCheckout event
              try {
                if (typeof fbq === 'function') fbq('track', 'InitiateCheckout');
              } catch (pxErr) {}
              
              window.location.href = baseHref + currentParams;
            } catch (err) {}
          }, true);
        }
      } catch (e) {}
    }
    
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', forceParamsOnButtons);
    } else {
      forceParamsOnButtons();
    }
    
    if (window.MutationObserver) {
      var observer = new MutationObserver(function(mutations) {
        for (var i = 0; i < mutations.length; i++) {
          if (mutations[i].addedNodes.length > 0) forceParamsOnButtons();
        }
      });
      if (document.body) observer.observe(document.body, {childList: true, subtree: true});
    }
  })();
  </script>
